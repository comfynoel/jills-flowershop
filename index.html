<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jill's Flowershop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; cursor: default; }
  :root { --font-base: Garamond, serif; --font-ko: 'Pretendard','Noto Sans KR',sans-serif; --font-pixel: 'Press Start 2P',monospace; }
  #game { min-height:100vh; font-family:var(--font-base); background:#0a0a0a; color:#f0ece4; position:relative; overflow:hidden; }
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center; position:relative; z-index:1; }
  .screen.active { display:flex; }
  .title-pixel { font-family:var(--font-pixel); font-size:32px; color:#f0ece4; line-height:1.6; margin-bottom:0.5rem; }
  .title-pixel .title-red { color:#c0392b; }
  .subtitle { font-size:12px; color:#666; letter-spacing:2px; text-transform:uppercase; margin-bottom:2rem; }
  .time-badge { font-size:10px; letter-spacing:3px; color:#c0392b; border:1px solid #c0392b44; padding:5px 14px; margin-bottom:2.5rem; }
  button, .flower-card { cursor:crosshair; }
  .btn-main { background:none; border:1px solid #f0ece4; color:#f0ece4; padding:12px 36px; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:crosshair; font-family:var(--font-base); transition:all 0.3s; margin:6px; }
  .btn-main:hover { background:#f0ece4; color:#0a0a0a; }
  .btn-red { border-color:#c0392b; color:#f0ece4; background:#c0392b; }
  .btn-red:hover { background:#a02020; border-color:#a02020; }
  .btn-white { border-color:#f0ece4; color:#0a0a0a; background:#f0ece4; }
  .btn-white:hover { background:#d0ccc4; border-color:#d0ccc4; }
  .narrative { font-size:18px; line-height:1.9; color:#ccc; max-width:800px; margin-bottom:2rem; font-style:italic; }
  .section-label { font-size:24px; letter-spacing:3px; color:#fff; text-transform:uppercase; margin-bottom:1.5rem; }
  .flower-grid { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:2rem; max-width:780px; }
  .flower-card { width:180px; background:#11111100; border:1px solid #22222200; padding:1rem 0.8rem; cursor:crosshair; transition:all 0.3s; }
  .flower-card:hover { border-color:#c0392b; background:#1a0a0944; }
  .flower-icon { font-size:24px; margin-bottom:6px; }
  .flower-name { font-size:15px; color:#f0ece4; margin-bottom:3px; font-style:italic; }
  .flower-emotion { font-size:11px; color:#666; letter-spacing:1px; }

  /* Confirm popup */
  .popup-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; }
  .popup-overlay.active { display:flex; }
  .popup-box { background:#0f0f0f; border:1px solid #c0392b44; padding:2.5rem 3rem; text-align:center; max-width:380px; width:90%; }
  .popup-flower { font-size:48px; margin-bottom:1rem; }
  .popup-name { font-size:18px; color:#f0ece4; font-style:italic; margin-bottom:0.3rem; }
  .popup-emotion { font-size:11px; color:#666; letter-spacing:2px; text-transform:uppercase; margin-bottom:1.5rem; }
  .popup-question { font-size:14px; color:#ccc; margin-bottom:2rem; font-style:italic; }
  .popup-btns { display:flex; gap:12px; justify-content:center; }

  /* Activity modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); z-index:300; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:#0d0d0d; border:1px solid #2a2a2a; padding:2rem 2.2rem; max-width:440px; width:92%; display:flex; flex-direction:column; gap:14px; }
  .modal-action-label { font-size:10px; letter-spacing:3px; color:#c0392b; text-transform:uppercase; }
  .modal-prompt { font-size:14px; color:#888; font-style:italic; line-height:1.7; }

  /* write */
  .write-area { width:100%; background:#111; border:1px solid #2a2a2a; color:#f0ece4; font-family:var(--font-base); font-size:15px; font-style:italic; padding:14px 16px; resize:none; min-height:110px; line-height:1.8; outline:none; }
  .write-area::placeholder { color:#3a3a3a; }
  .write-area:focus { border-color:#c0392b33; }
  .write-hint { font-size:10px; color:#3a3a3a; font-style:italic; text-align:right; }

  /* breath */
  .breath-bar-wrap { width:100%; height:3px; background:#1a1a1a; border-radius:2px; }
  .breath-bar-fill { height:3px; background:#c0392b; border-radius:2px; width:10%; }
  .breath-text { font-size:13px; color:#666; font-style:italic; letter-spacing:1px; text-align:center; }
  .breath-count { font-size:11px; color:#444; text-align:center; }

  /* wait */
  .wait-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .wait-ring-wrap { position:relative; width:52px; height:52px; }
  .wait-ring-bg { position:absolute; top:0; left:0; width:52px; height:52px; border-radius:50%; border:2px solid #1a1a1a; }
  .wait-ring { position:absolute; top:0; left:0; width:52px; height:52px; border-radius:50%; border:2px solid transparent; border-top-color:#c0392b; }
  .wait-text { font-size:13px; color:#666; font-style:italic; }
  .wait-sec { font-size:11px; color:#444; }

  /* tap */
  .tap-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .tap-btn-big { background:none; border:1px solid #c0392b44; color:#c0392b; padding:12px 36px; font-size:13px; cursor:crosshair; font-family:var(--font-base); letter-spacing:2px; transition:all 0.15s; }
  .tap-btn-big:hover { background:#c0392b11; }
  .tap-btn-big:active { transform:scale(0.97); }
  .tap-count { font-size:11px; color:#444; font-style:italic; }

  /* hold */
  .hold-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .hold-btn-big { background:none; border:1px solid #c0392b44; color:#c0392b; padding:12px 36px; font-size:13px; cursor:crosshair; font-family:var(--font-base); letter-spacing:2px; user-select:none; -webkit-user-select:none; }
  .hold-prog-wrap { width:140px; height:2px; background:#1a1a1a; border-radius:2px; }
  .hold-prog-fill { height:2px; background:#c0392b; border-radius:2px; width:0%; transition:width 0.1s linear; }
  .hold-text { font-size:11px; color:#444; font-style:italic; }

  /* close btn */
  .modal-close { background:none; border:1px solid #2a2a2a; color:#555; padding:7px 18px; font-size:10px; letter-spacing:2px; cursor:crosshair; font-family:var(--font-base); text-transform:uppercase; transition:all 0.3s; align-self:flex-end; }
  .modal-close:hover { border-color:#888; color:#f0ece4; }

  /* Grow */
  .grow-area { width:100%; max-width:480px; }
  .stage-label { font-size:13px; letter-spacing:2px; color:#888; text-transform:uppercase; margin-bottom:0.5rem; }
  .stage-name { font-size:22px; color:#f0ece4; font-style:italic; margin-bottom:1.5rem; }
  .flower-display { font-size:72px; margin-bottom:1rem; transition:all 0.5s; }
  .progress-bar { width:100%; height:2px; background:#1a1a1a; margin-bottom:0.5rem; }
  .progress-fill { height:2px; background:#c0392b; transition:width 0.6s; }
  .progress-label { font-size:10px; color:#555; letter-spacing:1px; text-align:right; margin-bottom:2rem; }
  .message-box { font-size:15px; font-style:italic; color:#c0392b; min-height:24px; margin-bottom:1.2rem; }
  .action-grid { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:1.5rem; }
  .action-item { display:flex; align-items:center; gap:4px; }
  .action-btn { background:none; border:1px solid #333; color:#aaa; padding:8px 16px; font-size:16px; cursor:crosshair; font-family:var(--font-base); transition:all 0.25s; letter-spacing:1px; }
  .action-btn:hover { border-color:#888; color:#f0ece4; }
  .action-btn:disabled { opacity:0.3; cursor:default; }
  .plus-btn { background:none; border:1px solid #2a2a2a; color:#444; width:26px; height:26px; font-size:14px; cursor:crosshair; transition:all 0.2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0; }
  .plus-btn:hover { border-color:#c0392b44; color:#c0392b; }
  .plus-btn:disabled { opacity:0.15; pointer-events:none; }

  .final-word { font-size:26px; color:#c0392b; font-style:italic; margin-bottom:0.5rem; }
  .final-desc { font-size:14px; color:#999; line-height:1.8; max-width:400px; margin-bottom:2rem; }
  .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  #s-garden { justify-content:flex-start; padding-top:3rem; }
  #s-pick { justify-content:center; padding-top:2rem; }
  .garden-ground { width:100%; max-width:1200px; min-height:260px; position:relative; margin-bottom:2rem; }
  .garden-flowers { display:flex; gap:40px 0; flex-wrap:wrap; justify-content:center; align-items:flex-end; padding-bottom:60px; min-height:200px; }
  .garden-flower { display:flex; flex-direction:column; align-items:center; width:90px; padding:0 4px; margin:0 8px; cursor:crosshair; transition:transform 0.3s; position:relative; }
  .garden-flower:hover { transform:translateY(-6px); }
  .gf-emoji { font-size:38px; margin-bottom:2px; animation:sway 3s ease-in-out infinite; }
  .gf-stem { width:2px; height:28px; background:linear-gradient(to top,#1a3a1a,#2d5a2d); }
  .gf-word { font-size:12px; letter-spacing:1px; color:#c0392b; text-transform:uppercase; margin-top:8px; }
  .gf-date { font-size:12px; color:#444; margin-top:2px; }
  .gf-glow-red { filter:drop-shadow(0 0 10px #ff6b6b88); }
  .gf-glow-green { filter:drop-shadow(0 0 10px #6bffb888); }
  .gf-glow-gold { filter:drop-shadow(0 0 10px #ffd70088); }
  .gf-glow-pink { filter:drop-shadow(0 0 10px #ff9de288); }
  .gf-glow-blue { filter:drop-shadow(0 0 10px #6bb5ff88); }
  .gf-glow-purple { filter:drop-shadow(0 0 10px #c06bff88); }
  .gf-glow-white { filter:drop-shadow(0 0 10px #ffffff66); }
  .gf-glow-orange { filter:drop-shadow(0 0 10px #ffaa4488); }
  .gf-glow-teal { filter:drop-shadow(0 0 10px #44ffee88); }
  @keyframes sway { 0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);} }
  .empty-garden { font-size:14px; color:#444; font-style:italic; padding:3rem 0; }
  .garden-count { font-size:16px; color:#555; letter-spacing:2px; margin-bottom:3rem; }
  .gf-tooltip { display:none; position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:#111; border:1px solid #c0392b33; padding:6px 10px; font-size:10px; color:#ccc; white-space:nowrap; font-style:italic; z-index:10; }
  .garden-flower:hover .gf-tooltip { display:block; }
  .btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .lang-toggle { position:fixed; top:18px; right:18px; z-index:100; display:flex; border:1px solid #333; overflow:hidden; }
  .lang-btn { background:none; border:none; color:#666; padding:6px 13px; font-size:11px; letter-spacing:1px; cursor:crosshair; font-family:var(--font-base); transition:all 0.2s; }
  .lang-btn.active { background:#c0392b; color:#f0ece4; }
  .lang-btn:hover:not(.active) { color:#f0ece4; }
  body.lang-ko .btn-main,body.lang-ko .action-btn,body.lang-ko .narrative,
  body.lang-ko .section-label,body.lang-ko .subtitle,body.lang-ko .time-badge,
  body.lang-ko .flower-name,body.lang-ko .flower-emotion,body.lang-ko .stage-name,
  body.lang-ko .stage-label,body.lang-ko .progress-label,body.lang-ko .message-box,
  body.lang-ko .final-word,body.lang-ko .final-desc,body.lang-ko .garden-count,
  body.lang-ko .empty-garden,body.lang-ko .gf-word,body.lang-ko .gf-date,
  body.lang-ko .gf-tooltip,body.lang-ko .popup-question,body.lang-ko .popup-name,
  body.lang-ko .popup-emotion,body.lang-ko .modal-prompt,body.lang-ko .write-area,
  body.lang-ko .write-hint,body.lang-ko .modal-close,body.lang-ko .modal-action-label,
  body.lang-ko .breath-text,body.lang-ko .wait-text,body.lang-ko .hold-text,body.lang-ko .tap-count
  { font-family:var(--font-ko); letter-spacing:0; }
  body.lang-ko .btn-main { letter-spacing:0.5px; font-size:13px; }
  body.lang-ko .narrative { font-style:normal; font-weight:300; }
  body.lang-ko .message-box { font-style:normal; }
  body.lang-ko .final-word { font-style:normal; font-weight:500; }
  body.lang-ko .stage-name { font-style:normal; }
  body.lang-ko .modal-prompt { font-style:normal; }
</style>
</head>
<body class="lang-en">
<div id="game">
  <canvas class="stars" id="stars"></canvas>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">한국어</button>
  </div>

  <div class="screen active" id="s-intro">
    <h1 class="title-pixel"><span class="title-red">Jill's</span><br>Flowershop</h1>
    <p class="subtitle" data-i18n="subtitle">A safe space for sleepless creatives</p>
    <div class="time-badge" data-i18n="opens">OPENS AT 4AM</div>
    <div class="btn-row">
      <button class="btn-main btn-red" onclick="goTo('s-enter')" data-i18n="enterShop">Enter the shop</button>
      <button class="btn-main btn-white" onclick="goTo('s-garden');renderGarden()" data-i18n="myGarden">My garden</button>
    </div>
  </div>

  <div class="screen" id="s-enter">
    <p class="section-label" data-i18n="timeLabel">4:00 AM · Seoul</p>
    <p class="narrative" id="narrativeText"></p>
    <button class="btn-main" onclick="goTo('s-pick')" data-i18n="browseFlowers">Browse the flowers</button>
  </div>

  <div class="screen" id="s-pick">
    <p class="section-label" style="margin-top:1rem;" data-i18n="pickLabel">What are you carrying tonight?</p>
    <div class="flower-grid" id="flowerGrid"></div>
  </div>

  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <div class="popup-flower" id="popupFlower"></div>
      <p class="popup-name" id="popupName"></p>
      <p class="popup-emotion" id="popupEmotion"></p>
      <p class="popup-question" data-i18n="popupQ">Wanna pick this flower?</p>
      <div class="popup-btns">
        <button class="btn-main btn-red" onclick="confirmPick()" data-i18n="popupYes">Yes</button>
        <button class="btn-main" onclick="closePopup()" data-i18n="popupNo">No</button>
      </div>
    </div>
  </div>

  <!-- Activity modal -->
  <div class="modal-overlay" id="actModal">
    <div class="modal-box" id="actModalBox">
      <p class="modal-action-label" id="actModalLabel"></p>
      <p class="modal-prompt" id="actModalPrompt"></p>
      <div id="actModalContent"></div>
      <button class="modal-close" onclick="closeActModal()" data-i18n="closeModal">Close</button>
    </div>
  </div>

  <div class="screen" id="s-grow">
    <div class="grow-area">
      <p class="stage-label" id="stageLabelText"></p>
      <p class="stage-name" id="stageName"></p>
      <div class="flower-display" id="flowerDisplay">🌑</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <p class="progress-label" id="progressLabel"></p>
      <p class="message-box" id="msgBox"></p>
      <div class="action-grid" id="actionGrid"></div>
    </div>
  </div>

  <div class="screen" id="s-end">
    <p class="section-label" data-i18n="bloomed">Your flower bloomed</p>
    <div class="flower-display" id="endFlower"></div>
    <p class="final-word" id="endWord"></p>
    <p class="final-desc" id="endDesc"></p>
    <div class="btn-row">
      <button class="btn-main btn-white" onclick="goTo('s-garden');renderGarden()" data-i18n="seeGarden">See my garden</button>
      <button class="btn-main btn-red" onclick="goTo('s-pick');resetGame()" data-i18n="visitAgain">Pick Another Flower</button>
    </div>
  </div>

  <div class="screen" id="s-garden">
    <p class="section-label" data-i18n="myGardenLabel">My Garden</p>
    <p class="garden-count" id="gardenCount"></p>
    <div class="garden-ground"><div class="garden-flowers" id="gardenFlowers"></div></div>
    <div class="btn-row">
      <button class="btn-main" onclick="goTo('s-enter')" data-i18n="growAnother">Grow another</button>
      <button class="btn-main btn-red" onclick="goTo('s-intro')" data-i18n="backToShop">Back to shop</button>
    </div>
  </div>
</div>

<script>
const i18n = {
  en: {
    subtitle:"A safe space for sleepless creatives", opens:"OPENS AT 4AM",
    enterShop:"Enter the shop", myGarden:"My garden", timeLabel:"4:00 AM · Seoul",
    narrative:"You wander in from the dark. The sign flickers. Inside, flowers you've never seen before — the kind that only grow in the hardest places.<br><br>The gardener looks up. \"You've been awake a while,\" she says. \"Pick one.\"",
    browseFlowers:"Browse the flowers", pickLabel:"What are you carrying tonight?",
    popupQ:"Wanna pick this flower?", popupYes:"Yes", popupNo:"No",
    stageOf:(s,t)=>`Stage ${s} of ${t}`, actionsOf:(d,t)=>`${d} / ${t} actions`,
    bloomed:"Your flower bloomed", seeGarden:"See my garden", visitAgain:"Pick Another Flower",
    myGardenLabel:"My Garden", flowersGrown:(n)=>n===1?"1 flower grown":`${n} flowers grown`,
    emptyGarden:"Your garden is waiting.<br>Grow your first flower tonight.",
    growAnother:"Grow another", backToShop:"Back to shop", closeModal:"Close",
    breathIn:"breathe in", breathHold:"hold", breathOut:"breathe out",
    breathLeft:(n)=>`${n} breath${n===1?'':'s'} left`,
    waitSit:"sit with this...", tapHint:"tap as many times as you need", tapCount:(n)=>`tapped ${n} times`,
    holdHint:"don't let go yet", holdDone:"held", writePlaceholder:"write here — no one will see this...",
    writeHint:"this stays between you and the dark"
  },
  ko: {
    subtitle:"잠 못 드는 크리에이티브를 위한 공간", opens:"새벽 4시에 열어요",
    enterShop:"가게 들어가기", myGarden:"내 정원", timeLabel:"새벽 4시 · 서울",
    narrative:"어둠 속에서 걸어 들어왔어요. 간판이 깜빡입니다. 안에는 한 번도 본 적 없는 꽃들이 있어요 — 어두운 곳에서만 피어나는 꽃들.<br><br>Jill이 고개를 들어요. \"오래 깨어 있었군요,\" 그녀가 말해요. \"하나 골라봐요.\"",
    browseFlowers:"꽃 구경하기", pickLabel:"오늘 밤 무엇을 안고 있나요?",
    popupQ:"이 꽃을 가져갈까요?", popupYes:"네", popupNo:"아니요",
    stageOf:(s,t)=>`${s}단계 / 총 ${t}단계`, actionsOf:(d,t)=>`${d} / ${t} 행동`,
    bloomed:"꽃이 피었어요", seeGarden:"내 정원 보기", visitAgain:"다른 꽃 고르기",
    myGardenLabel:"내 정원", flowersGrown:(n)=>`${n}개의 꽃을 피웠어요`,
    emptyGarden:"정원이 기다리고 있어요.<br>오늘 밤 첫 번째 꽃을 키워보세요.",
    growAnother:"또 키우기", backToShop:"가게로 돌아가기", closeModal:"닫기",
    breathIn:"숨 들이쉬기", breathHold:"잠깐 멈추기", breathOut:"숨 내쉬기",
    breathLeft:(n)=>`${n}번 남았어요`,
    waitSit:"잠시 여기 있어요...", tapHint:"필요한 만큼 탭하세요", tapCount:(n)=>`${n}번 탭했어요`,
    holdHint:"아직 놓지 마세요", holdDone:"잘 버텼어요", writePlaceholder:"여기에 써요 — 아무도 보지 않아요...",
    writeHint:"이건 당신과 어둠 사이의 비밀이에요"
  }
};

// Activity types: write | breath | wait | tap | hold
// Each flower action has a matched + activity
// Format: { type, prompt, promptKo, duration? (for wait/hold), count? (for breath), minTaps? }
const flowerData = [
  { icon:"💛", name:"Sunpetal", emotion:"Joy", glowClass:"gf-glow-teal", result:"☀️", word:"Joy",
    desc:"You let yourself feel it fully, without shrinking it. That's a kind of bravery too.",
    stages:["A small smile","Letting it in","Sharing it","Radiating"],
    msgs:["Joy doesn't need permission to exist.","Letting yourself feel good is not betraying your hard times.","Joy shared is joy doubled.","You deserve the good moments too."],
    actions:[
      ["Notice what made you smile","Don't dismiss it","It counts","Let it be real"],
      ["Laugh if you want","Dance a little","Sing quietly","Let it be silly"],
      ["Tell someone","Share the warmth","Joy grows when given","Pass it on"],
      ["Soak it in","You deserve this","Joy is not guilt","Let it be full"]

      [{type:"wait",duration:20,prompt:"Feel the ground. 20 seconds — you are on solid ground.",promptKo:"땅을 느껴요. 20초 — 당신은 단단한 땅 위에 있어요."},{type:"write",prompt:"Write: in this moment, I am safe. Right now, nothing bad is happening.",promptKo:"써보세요: 이 순간, 나는 안전해요. 지금 당장 나쁜 일은 일어나지 않고 있어요."},{type:"breath",count:4,prompt:"Four complete breaths — all the way out each time.",promptKo:"네 번 완전한 숨쉬기 — 매번 끝까지 내쉬기."},{type:"write",prompt:"Write: this moment is enough.",promptKo:"써보세요: 이 순간으로 충분해요."}]

  },
  { icon:"🥀", name:"Nightbloom", emotion:"Grief", glowClass:"gf-glow-pink", result:"🌹", word:"Compassion",
    desc:"You carried something heavy and let it bloom instead of vanish.",
    stages:["Seed in the dark","Roots reaching down","First pale shoot","Blooming at 4AM"],
    msgs:["Even grief needs soil.","Roots grow downward first.","The shoot knows the way up.","It was always yours."],
    actions:[
      ["Sit with it","Let it breathe","Water gently","Wait in silence"],
      ["Write it down","Hold the stem","Whisper to it","Watch the dark"],
      ["Feel the ache","Let rain in","Lean into it","Stay close"],
      ["Watch it open","Breathe deep","Accept the color","Let it be yours"]
    ],
    plus:[
      [{type:"wait",duration:25,prompt:"Sit with it. 25 seconds — no words needed. Just be here.",promptKo:"함께 앉아요. 25초 — 말이 필요 없어요. 그냥 여기 있어요."},{type:"breath",count:2,prompt:"Let it breathe. Two slow, heavy breaths.",promptKo:"숨쉬게 해요. 두 번 천천히, 무겁게 숨쉬기."},{type:"write",prompt:"Write a few words about what you're grieving — as much or as little as you want.",promptKo:"애도하는 것에 대해 몇 단어를 써요 — 많이든 적게든."},{type:"wait",duration:20,prompt:"Wait in silence. 20 seconds. Nothing to do.",promptKo:"침묵 속에 기다려요. 20초. 할 것 없어요."}],
      [{type:"write",prompt:"Write it down — whatever is in you right now.",promptKo:"써요 — 지금 당신 안에 있는 것 무엇이든."},{type:"hold",duration:5000,prompt:"Hold this button for 5 seconds. Hold the stem — don't let go yet.",promptKo:"이 버튼을 5초 동안 누르고 있어요. 줄기를 잡아요 — 아직 놓지 마요."},{type:"write",prompt:"Write something to what or who you lost.",promptKo:"잃어버린 것이나 사람에게 무언가를 써요."},{type:"wait",duration:20,prompt:"Watch the dark. 20 seconds — you're still here.",promptKo:"어둠을 바라봐요. 20초 — 당신은 아직 여기 있어요."}],
      [{type:"write",prompt:"Where does the grief live in your body? Write it.",promptKo:"슬픔이 몸의 어디에 살고 있나요? 써요."},{type:"wait",duration:20,prompt:"Let the rain in. 20 seconds — don't block it.",promptKo:"비를 맞아들여요. 20초 — 막지 마요."},{type:"write",prompt:"Write: I lean into this because I loved.",promptKo:"써보세요: 나는 사랑했기 때문에 이것에 기대요."},{type:"breath",count:3,prompt:"Stay close. Three breaths — slow and present.",promptKo:"가까이 있어요. 세 번 천천히 현재에 집중하며 숨쉬기."}],
      [{type:"wait",duration:20,prompt:"Watch it open. 20 seconds — something is blooming.",promptKo:"피어나는 걸 봐요. 20초 — 무언가 피어나고 있어요."},{type:"breath",count:4,prompt:"Breathe deep. Four full breaths.",promptKo:"깊게 숨쉬기. 네 번 깊게."},{type:"write",prompt:"Write: I accept that this is part of me now.",promptKo:"써보세요: 이것이 이제 내 일부임을 받아들여요."},{type:"write",prompt:"Write: this grief was love. It is mine. It made me.",promptKo:"써보세요: 이 슬픔은 사랑이었어요. 내 것이에요. 나를 만들었어요."}]
    ]
  },
  { icon:"🌫️", name:"Greymoss", emotion:"Emptiness", glowClass:"gf-glow-purple", result:"🌙", word:"Becoming",
    desc:"You sat in the nothing long enough that something small, quiet, and real came back.",
    stages:["Nothing at all","A faint flicker","Something stirs","Quiet aliveness"],
    msgs:["Empty is not broken. Empty is just before.","Even a flicker is a beginning.","Curiosity is the seed of aliveness.","Something in you kept going. That's everything."],
    actions:[
      ["Allow the nothing","Don't fill it yet","Rest in the blank","It's okay to be empty"],
      ["Notice one small thing","A color, a sound","Touch something real","Follow one tiny pull"],
      ["Do one tiny thing","Make something small","Move your body gently","Let curiosity lead"],
      ["Name what stirred","Something is there","You are not hollow","Life is returning"]
    ],
    plus:[
      [{type:"wait",duration:25,prompt:"Allow the nothing. 25 seconds — don't fill it.",promptKo:"아무것도 없음을 허락해요. 25초 — 채우지 마요."},{type:"wait",duration:20,prompt:"Don't fill it yet. 20 seconds — just be in the empty.",promptKo:"아직 채우지 마요. 20초 — 그냥 비어있는 곳에 있어요."},{type:"breath",count:2,prompt:"Rest in the blank. Two gentle breaths.",promptKo:"빈 곳에서 쉬어요. 두 번 부드럽게 숨쉬기."},{type:"wait",duration:15,prompt:"Empty is okay. 15 seconds — you are not broken.",promptKo:"비어있어도 괜찮아요. 15초 — 당신은 고장나지 않았어요."}],
      [{type:"write",prompt:"Notice one small thing — a color you can see, a sound you can hear.",promptKo:"작은 것 하나를 알아채요 — 볼 수 있는 색, 들을 수 있는 소리."},{type:"write",prompt:"Write a color you can see right now.",promptKo:"지금 볼 수 있는 색을 써요."},{type:"wait",duration:15,prompt:"Touch something real. 15 seconds — feel its texture.",promptKo:"진짜인 것을 만져요. 15초 — 그 질감을 느껴요."},{type:"write",prompt:"What small thing is pulling at your attention, even slightly?",promptKo:"당신의 주의를 끄는 작은 것이 있나요, 아주 조금이라도?"}],
      [{type:"write",prompt:"Write one word — any word. Just one.",promptKo:"단어 하나를 써요 — 아무 단어나. 그냥 하나."},{type:"write",prompt:"Make something small — even a single sentence.",promptKo:"작은 것을 만들어요 — 문장 하나라도."},{type:"breath",count:2,prompt:"Move your body gently. Two breaths — a little deeper.",promptKo:"몸을 살살 움직여요. 두 번 숨쉬기 — 조금 더 깊게."},{type:"write",prompt:"What made you curious just now, even a little?",promptKo:"방금 조금이라도 호기심이 생긴 게 있나요?"}],
      [{type:"write",prompt:"Name what stirred. What tiny thing came back?",promptKo:"무엇이 움직였는지 이름 붙여요. 어떤 작은 것이 돌아왔나요?"},{type:"write",prompt:"Write: something is there. I can feel it.",promptKo:"써보세요: 거기 뭔가 있어요. 느껴져요."},{type:"breath",count:3,prompt:"Three breaths. Life is returning — feel it.",promptKo:"세 번 숨쉬기. 삶이 돌아오고 있어요 — 느껴봐요."},{type:"write",prompt:"Write: I am becoming. I don't know what yet, but I am.",promptKo:"써보세요: 나는 되어가고 있어요. 아직 무엇인지 모르지만, 되어가고 있어요."}]
    ]
  }
];

let lang='en', chosen=null, stage=0, actsDone=0;
const actsPerStage=4;
let breathAnim=null, waitTimer=null;

function setLang(l){lang=l;document.body.className='lang-'+l;document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('btn-ko').classList.toggle('active',l==='ko');applyI18n();renderFlowers();}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k]&&typeof i18n[lang][k]==='string')el.textContent=i18n[lang][k];});document.getElementById('narrativeText').innerHTML=i18n[lang].narrative;}
function loadGarden(){try{return JSON.parse(localStorage.getItem('jills_garden')||'[]');}catch(e){return[];}}
function saveToGarden(e){const g=loadGarden();g.push(e);localStorage.setItem('jills_garden',JSON.stringify(g));}
function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function resetGame(){chosen=null;stage=0;actsDone=0;renderFlowers();}

function renderFlowers(){
  const grid=document.getElementById('flowerGrid');grid.innerHTML='';
  flowerData.forEach((f,i)=>{
    const card=document.createElement('div');card.className='flower-card';
    card.innerHTML=`<div class="flower-icon">${f.icon}</div><div class="flower-name">${f.name}</div><div class="flower-emotion">${f.emotion}</div>`;
    card.onclick=()=>openPopup(i);grid.appendChild(card);
  });
}
function openPopup(i){chosen=i;const f=flowerData[i];document.getElementById('popupFlower').textContent=f.icon;document.getElementById('popupName').textContent=f.name;document.getElementById('popupEmotion').textContent=f.emotion;document.getElementById('popup').classList.add('active');}
function closePopup(){document.getElementById('popup').classList.remove('active');chosen=null;}
function confirmPick(){document.getElementById('popup').classList.remove('active');stage=0;actsDone=0;goTo('s-grow');renderGrow();}

function renderGrow(){
  const f=flowerData[chosen];
  document.getElementById('stageLabelText').textContent=i18n[lang].stageOf(stage+1,4);
  document.getElementById('stageName').textContent=f.stages[stage];
  const icons=['🌑','🌱','🌿',f.result];
  document.getElementById('flowerDisplay').textContent=icons[stage];
  updateProgress();renderActions();document.getElementById('msgBox').textContent='';
}
function updateProgress(){
  const total=actsPerStage*4,done=stage*actsPerStage+actsDone;
  document.getElementById('progressFill').style.width=Math.round((done/total)*100)+'%';
  document.getElementById('progressLabel').textContent=i18n[lang].actionsOf(done,total);
}
function renderActions(){
  const f=flowerData[chosen];
  const grid=document.getElementById('actionGrid');grid.innerHTML='';
  f.actions[stage].forEach((a,i)=>{
    const item=document.createElement('div');item.className='action-item';
    const btn=document.createElement('button');btn.className='action-btn';btn.textContent=a;
    btn.onclick=()=>doAction(i,btn,item);
    const plus=document.createElement('button');plus.className='plus-btn';plus.title='Go deeper';plus.textContent='+';
    plus.onclick=(e)=>{e.stopPropagation();openActModal(stage,i);};
    item.appendChild(btn);item.appendChild(plus);grid.appendChild(item);
  });
}
function doAction(i,btn,item){
  btn.disabled=true;
  const plus=item.querySelector('.plus-btn');if(plus)plus.disabled=true;
  actsDone++;updateProgress();
  const f=flowerData[chosen];document.getElementById('msgBox').textContent=f.msgs[stage];
  if(actsDone>=actsPerStage){setTimeout(()=>{stage++;actsDone=0;if(stage>=4){showEnding();}else{renderGrow();}},900);}
}

function openActModal(stg,actionIdx){
  const f=flowerData[chosen];
  const act=f.plus[stg][actionIdx];
  const actionName=f.actions[stg][actionIdx];
  const prompt=lang==='ko'&&act.promptKo?act.promptKo:act.prompt;
  document.getElementById('actModalLabel').textContent=actionName;
  document.getElementById('actModalPrompt').textContent=prompt;
  const content=document.getElementById('actModalContent');content.innerHTML='';
  if(act.type==='write') buildWriteModal(content);
  else if(act.type==='breath') buildBreathModal(content,act.count||3);
  else if(act.type==='wait') buildWaitModal(content,act.duration||15);
  else if(act.type==='tap') buildTapModal(content,act.minTaps||8);
  else if(act.type==='hold') buildHoldModal(content,act.duration||5000);
  document.getElementById('actModal').classList.add('active');
}
function closeActModal(){
  if(breathAnim){cancelAnimationFrame(breathAnim);breathAnim=null;}
  if(waitTimer){clearInterval(waitTimer);waitTimer=null;}
  document.getElementById('actModalArea')&&(document.getElementById('actModalArea').value='');
  document.getElementById('actModal').classList.remove('active');
}

function buildWriteModal(container){
  const ta=document.createElement('textarea');ta.id='actModalArea';ta.className='write-area';ta.placeholder=i18n[lang].writePlaceholder;
  const hint=document.createElement('p');hint.className='write-hint';hint.textContent=i18n[lang].writeHint;
  container.appendChild(ta);container.appendChild(hint);
}

function buildBreathModal(container,count){
  let remaining=count,phase=0;
  const phaseNames=[i18n[lang].breathIn,i18n[lang].breathHold,i18n[lang].breathOut];
  const phaseDurs=[4000,1500,4000];
  const barWrap=document.createElement('div');barWrap.className='breath-bar-wrap';
  const fill=document.createElement('div');fill.className='breath-bar-fill';barWrap.appendChild(fill);
  const txt=document.createElement('p');txt.className='breath-text';txt.textContent=phaseNames[0];
  const cnt=document.createElement('p');cnt.className='breath-count';cnt.textContent=i18n[lang].breathLeft(remaining);
  container.appendChild(barWrap);container.appendChild(txt);container.appendChild(cnt);
  let start=null;
  function anim(ts){
    if(!start)start=ts;
    const el=ts-start,dur=phaseDurs[phase],pct=Math.min(el/dur,1);
    if(phase===0)fill.style.width=(10+80*pct)+'%';
    else if(phase===1)fill.style.width='90%';
    else fill.style.width=(90-80*pct)+'%';
    if(el>=dur){start=null;phase=(phase+1)%3;if(phase===0){remaining--;cnt.textContent=i18n[lang].breathLeft(remaining);if(remaining<=0){cancelAnimationFrame(breathAnim);breathAnim=null;cnt.textContent='✓ done';return;}}txt.textContent=phaseNames[phase];}
    breathAnim=requestAnimationFrame(anim);
  }
  breathAnim=requestAnimationFrame(anim);
}

function buildWaitModal(container,seconds){
  let rem=seconds;
  const wrap=document.createElement('div');wrap.className='wait-wrap';
  const rw=document.createElement('div');rw.className='wait-ring-wrap';
  const bg=document.createElement('div');bg.className='wait-ring-bg';
  const ring=document.createElement('div');ring.className='wait-ring';
  rw.appendChild(bg);rw.appendChild(ring);
  const txt=document.createElement('p');txt.className='wait-text';txt.textContent=i18n[lang].waitSit;
  const sec=document.createElement('p');sec.className='wait-sec';sec.textContent=rem+'s';
  wrap.appendChild(rw);wrap.appendChild(txt);wrap.appendChild(sec);container.appendChild(wrap);
  ring.style.animation=`spin ${seconds}s linear forwards`;
  ring.style.cssText+=`;animation:spin ${seconds}s linear forwards;`;
  const style=document.createElement('style');style.textContent=`@keyframes spin{to{transform:rotate(360deg)}}`;document.head.appendChild(style);
  waitTimer=setInterval(()=>{rem--;sec.textContent=rem+'s';if(rem<=0){clearInterval(waitTimer);waitTimer=null;sec.textContent='✓ done';}},1000);
}

function buildTapModal(container,minTaps){
  let taps=0;
  const wrap=document.createElement('div');wrap.className='tap-wrap';
  const btn=document.createElement('button');btn.className='tap-btn-big';btn.textContent=i18n[lang].tapBtn||'tap';
  const cnt=document.createElement('p');cnt.className='tap-count';cnt.textContent=i18n[lang].tapHint;
  btn.onclick=()=>{taps++;cnt.textContent=i18n[lang].tapCount(taps);};
  wrap.appendChild(btn);wrap.appendChild(cnt);container.appendChild(wrap);
}

function buildHoldModal(container,duration){
  let holding=false,elapsed=0,iv;
  const wrap=document.createElement('div');wrap.className='hold-wrap';
  const btn=document.createElement('button');btn.className='hold-btn-big';btn.textContent=i18n[lang].holdBtn||'hold';
  const pw=document.createElement('div');pw.className='hold-prog-wrap';
  const pf=document.createElement('div');pf.className='hold-prog-fill';pw.appendChild(pf);
  const txt=document.createElement('p');txt.className='hold-text';txt.textContent=i18n[lang].holdHint;
  const start=()=>{holding=true;iv=setInterval(()=>{if(!holding){clearInterval(iv);return;}elapsed+=100;pf.style.width=Math.min((elapsed/duration)*100,100)+'%';if(elapsed>=duration){clearInterval(iv);txt.textContent=i18n[lang].holdDone||'held';}},100);};
  const stop=()=>{holding=false;if(elapsed<duration){elapsed=0;pf.style.width='0%';}};
  btn.addEventListener('mousedown',start);btn.addEventListener('mouseup',stop);btn.addEventListener('touchstart',(e)=>{e.preventDefault();start();});btn.addEventListener('touchend',stop);
  wrap.appendChild(btn);wrap.appendChild(pw);wrap.appendChild(txt);container.appendChild(wrap);
}

function showEnding(){
  const f=flowerData[chosen];
  document.getElementById('endFlower').textContent=f.result;
  document.getElementById('endWord').textContent=f.word;
  document.getElementById('endDesc').textContent=f.desc;
  const dateStr=new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{month:'short',day:'numeric',year:'numeric'});
  saveToGarden({result:f.result,word:f.word,date:dateStr,glowClass:f.glowClass,name:f.name,emotion:f.emotion});
  goTo('s-end');
}
function renderGarden(){
  const garden=loadGarden(),container=document.getElementById('gardenFlowers'),countEl=document.getElementById('gardenCount');
  container.innerHTML='';
  if(garden.length===0){container.innerHTML=`<p class="empty-garden">${i18n[lang].emptyGarden}</p>`;countEl.textContent='';return;}
  countEl.textContent=i18n[lang].flowersGrown(garden.length);
  garden.forEach((entry,idx)=>{
    const delay=(idx*0.15)+'s',div=document.createElement('div');div.className='garden-flower';
    div.innerHTML=`<div class="gf-tooltip">${entry.emotion||entry.name}</div><div class="gf-emoji ${entry.glowClass}" style="animation-delay:${delay}">${entry.result}</div><div class="gf-stem"></div><div class="gf-word">${entry.word}</div><div class="gf-date">${entry.date}</div>`;
    container.appendChild(div);
  });
}
function drawStars(){
  const c=document.getElementById('stars');c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  for(let i=0;i<140;i++){ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*0.9+0.2,0,Math.PI*2);ctx.fillStyle=`rgba(240,236,228,${Math.random()*0.5+0.1})`;ctx.fill();}
}
applyI18n();renderFlowers();drawStars();
window.addEventListener('resize',drawStars);
</script>
